name: rompin_forest_explorer
description: "Rompin Forest Explorer - Nature Therapy App for Children with Autism"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.1

  # State Management
  provider: ^6.1.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4

  # Camera & Image
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.5.3
  path_provider: ^2.1.5
  path: ^1.9.1

  # Networking
  http: ^1.2.2
  dio: ^5.7.0

  # Permissions
  permission_handler: ^11.3.1

  # UI
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  connectivity_plus: ^6.1.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
