name: NatureTherapyAI
options:
  bundleIdPrefix: com.naturetherapy
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1"

targets:
  NatureTherapyAI:
    type: application
    platform: iOS
    sources:
      - path: NatureTherapyAI
    settings:
      base:
        INFOPLIST_FILE: NatureTherapyAI/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.naturetherapy.explorer
        PRODUCT_NAME: "Nature Therapy AI Explorer"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: NatureTherapyAI/Info.plist
    dependencies: []
    preBuildScripts:
      - name: "Compile Core ML Model"
        script: |
          if [ -f "$SRCROOT/NatureTherapyAI/Resources/NatureDetection.mlmodel" ]; then
            echo "Core ML model found."
          else
            echo "warning: NatureDetection.mlmodel not found. Using fallback detection."
          fi
